name: EAS Build

# Trigger manually from the GitHub "Actions" tab → "EAS Build" → "Run workflow".
# The build runs on Expo's servers; track progress at https://expo.dev.
# Requires repo secret EXPO_TOKEN (Settings → Secrets and variables → Actions).

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [ios, android, all]
        default: ios
      profile:
        description: EAS build profile
        type: choice
        options: [preview, development, production]
        default: preview

jobs:
  build:
    name: Trigger EAS build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Start EAS build
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
