name: EAS Build

# Trigger manually from the GitHub "Actions" tab → "EAS Build" → "Run workflow".
# The build runs on Expo's servers; track progress at https://expo.dev.
# Requires repo secret EXPO_TOKEN (Settings → Secrets and variables → Actions).

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [ios, android, all]
        default: ios
      profile:
        description: EAS build profile
        type: choice
        options: [preview, development, production]
        default: preview

jobs:
  build:
    name: Trigger EAS build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_PRIVATE_KEY: ${{ secrets.ASC_API_KEY_PRIVATE_KEY }}
        run: |
          mkdir -p .expo
          printf '%s\n' "$ASC_API_KEY_PRIVATE_KEY" > .expo/asc_key.p8
          chmod 600 .expo/asc_key.p8

      - name: Start EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/.expo/asc_key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: eas build --platform ios --profile preview --non-interactive --no-wait
